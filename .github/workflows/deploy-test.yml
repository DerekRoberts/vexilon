name: Deploy TEST

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'app.py'
      - 'requirements.txt'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'pdf_cache/**'

permissions: {}

jobs:
  deploy-test:
    runs-on: ubuntu-latest
    environment: test
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Push code-only snapshot to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: ./scripts/deploy.sh "DerekRoberts/landru"
