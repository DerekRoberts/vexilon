name: Deploy TEST

on:
  push:
    branches:
      - main

permissions: {}

jobs:
  deploy-test:
    permissions:
      contents: read
    uses: ./.github/workflows/deploy-hf-spaces-reusable.yml
    with:
      space_name: 'DerekRoberts/landru'
      environment: 'test'
    secrets:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
