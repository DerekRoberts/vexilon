name: Merge

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy, e.g. sha-abc123def...'
        required: false
  push:
    branches: [main]

permissions: {}

jobs:
  deploy-prod:
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read
      packages: read
      pull-requests: read
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve image
        id: resolve
        uses: bcgov/actions/image-tracker@main
        with:
          package: vexilon
          token: ${{ github.token }}

      - name: Push image-based stub to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Selection Hierarchy:
          # 1. Manual Input (image_tag)
          # 2. Image Tracker Output (bundle.vexilon)
          # 3. Last Resort: Commit SHA
          
          TAG="${{ github.event.inputs.image_tag }}"
          
          if [ -z "$TAG" ] || [ "$TAG" == "null" ]; then
            BUNDLE_JSON='${{ steps.resolve.outputs.bundle }}'
            # If bundle is empty or invalid, jq will return empty due to '// empty'
            TAG=$(echo "${BUNDLE_JSON:-{}}" | jq -r '.vexilon // empty' 2>/dev/null || echo "")
          fi

          if [ -z "$TAG" ] || [ "$TAG" == "null" ]; then
            echo "::warning:: Image resolution failed. Falling back to commit SHA: sha-${{ github.sha }}"
            TAG="sha-${{ github.sha }}"
          fi

          echo "Final image selection: $TAG"
          ./.github/scripts/deploy.sh "$TAG" --prod

      - name: Verify Space boots successfully
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: ./.github/scripts/verify_deployment.sh "DerekRoberts/vexilon"

      - name: Notify Owners on Failure
        if: failure()
        uses: bcgov/actions/workflow-notifier@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          title: "PROD Deployment Failure: Vexilon"
          labels: "critical,deployment,prod"
