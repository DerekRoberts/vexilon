name: Promote Image to TEST

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  packages: write
  contents: read

jobs:
  promote:
    name: Promote PR Image to TEST
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    env:
      IMAGE_NAME: ghcr.io/${{ github.repository }}
      SOURCE_TAG: pr-${{ github.event.number }}
      TARGET_TAG: test

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Retag Image in GHCR
        # Skopeo is the industry standard for metadata-only image moves.
        # It's fast, lightweight, and doesn't require pulling layers to the runner.
        run: |
          skopeo copy --all \
            docker://${{ env.IMAGE_NAME }}:${{ env.SOURCE_TAG }} \
            docker://${{ env.IMAGE_NAME }}:${{ env.TARGET_TAG }}

      - name: Trigger Deployment to TEST Space
        # We trigger the existing deploy-test workflow to push the stub Dockerfile.
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy-test.yml',
              ref: 'main'
            })
