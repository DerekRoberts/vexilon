name: PR Open

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-${{ github.event.number }}
  cancel-in-progress: true

permissions: {}

env:
  OLLAMA_MODEL_ID: tinyllama
  OLLAMA_DATA_PATH: ./.ollama_data

jobs:
  check:
    name: Check Triggers
    if: (! github.event.pull_request.draft)
    runs-on: ubuntu-slim
    permissions:
      contents: read
      pull-requests: read
    outputs:
      triggered: ${{ steps.diff.outputs.triggered }}
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
      - id: diff
        uses: bcgov/actions/diff-triggers@main
        with:
          triggers: '["app/**", ".github/workflows/**"]'

  prepare-tests:
    name: Prepare Test Cache
    needs: check
    if: needs.check.outputs.triggered == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Cache Ollama Models
        uses: actions/cache@v5
        with:
          path: ./.ollama_data
          key: ollama-models-${{ env.OLLAMA_MODEL_ID }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Warm Cache (All Test Targets)
        uses: docker/bake-action@v7
        with:
          source: app
          files: compose.yml
          targets: dev
          set: |
            *.cache-from=type=gha
            *.cache-from=type=registry,ref=ghcr.io/miniontech/vexilon/agnav:buildcache
            *.cache-to=type=gha,mode=max

  test-unit:
    name: Unit Tests
    needs: check
    if: needs.check.outputs.triggered == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "app/uv.lock"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install Dependencies
        run: |
          cd app
          uv sync --frozen

      - name: Run Unit & Deploy Integrity Tests
        env:
          VERIFY_ENABLED: "true"
        run: |
          mkdir -p reports
          cd app
          uv run python -m pytest tests/test_*.py ../tests/deploy_integrity/test_*.py -v \
            --junitxml=../reports/junit.xml \
            --cov=indexing --cov=main --cov-report=xml:../reports/coverage.xml

      - name: Upload Coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: reports/

  validate-cache:
    name: Validate FAISS Cache
    needs: [test-unit, prepare-tests]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and Cache (Validator)
        uses: docker/bake-action@v7
        with:
          load: true
          source: app
          files: compose.yml
          targets: dev
          set: |
            *.cache-from=type=gha
            *.cache-from=type=registry,ref=ghcr.io/miniontech/vexilon/agnav:buildcache

      - name: Validate Cache Manifest
        run: docker compose -f app/compose.yml up test-cache

  test-integration-model:
    name: Integration Tests (Model)
    needs: [test-unit, prepare-tests]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Cache Ollama Models
        uses: actions/cache@v5
        with:
          path: ./.ollama_data
          key: ollama-models-${{ env.OLLAMA_MODEL_ID }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and Cache (Integration)
        uses: docker/bake-action@v7
        with:
          load: true
          source: app
          files: compose.yml
          targets: dev
          set: |
            *.cache-from=type=gha
            *.cache-from=type=registry,ref=ghcr.io/miniontech/vexilon/agnav:buildcache

      - name: Run Integration Tests
        run: docker compose -f app/compose.yml up test-integration-model

      - name: Dump Logs on Failure
        if: failure()
        run: docker compose -f app/compose.yml logs

      - name: Cleanup
        if: always()
        run: docker compose -f app/compose.yml down -v || true

  test-integration-app:
    name: Integration Tests (App)
    needs: [test-unit, prepare-tests]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and Cache (Functional Tests)
        uses: docker/bake-action@v7
        with:
          load: true
          source: app
          files: compose.yml
          targets: dev
          set: |
            *.cache-from=type=gha
            *.cache-from=type=registry,ref=ghcr.io/miniontech/vexilon/agnav:buildcache

      - name: Run Integration Tests (App)
        run: docker compose -f app/compose.yml up test-integration-app

      - name: Dump Logs on Failure
        if: failure()
        run: docker compose -f app/compose.yml logs

      - name: Cleanup
        if: always()
        run: docker compose -f app/compose.yml down -v || true

  test-e2e:
    name: End-to-End Tests
    needs: [test-unit, prepare-tests]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Cache Ollama Models
        uses: actions/cache@v5
        with:
          path: ./.ollama_data
          key: ollama-models-${{ env.OLLAMA_MODEL_ID }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and Cache (E2E)
        uses: docker/bake-action@v7
        with:
          load: true
          source: app
          files: compose.yml
          targets: dev
          set: |
            *.cache-from=type=gha
            *.cache-from=type=registry,ref=ghcr.io/miniontech/vexilon/agnav:buildcache

      - name: Run E2E Tests
        run: docker compose -f app/compose.yml up test-everything

      - name: Dump Logs on Failure
        if: failure()
        run: docker compose -f app/compose.yml logs

      - name: Cleanup
        if: always()
        run: docker compose -f app/compose.yml down -v || true

  build:
    name: Build & Push to GHCR
    needs: [test-unit, prepare-tests]
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      attestations: write
      contents: read
      id-token: write
      packages: write
    outputs:
      triggered: ${{ steps.builder.outputs.triggered }}
    steps:
      - name: Build and Push
        id: builder
        uses: bcgov/action-builder-ghcr@main
        with:
          package: agnav
          build_context: app
          build_file: app/Containerfile
          build_args: |
            VERSION=sha-${{ github.event.pull_request.head.sha }}
            REPO_URL=https://github.com/${{ github.repository }}

  trivy:
    name: Trivy Security Scan
    needs: [test-unit, prepare-tests]
    continue-on-error: true
    runs-on: ubuntu-slim
    permissions:
      contents: read
      security-events: write
    timeout-minutes: 1
    steps:
      - uses: actions/checkout@v6
      - name: Run Trivy vulnerability scanner in repo mode
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          format: "sarif"
          output: "trivy-results.sarif"
          ignore-unfixed: true
          scan-type: "fs"
          scanners: "vuln,secret,misconfig"
          severity: "CRITICAL,HIGH"

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: "trivy-results.sarif"

  results:
    name: Results
    needs: [build, test-integration-model, test-integration-app, test-e2e, validate-cache, trivy]
    if: always()
    runs-on: ubuntu-slim
    steps:
      - if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'canceled')
        run: |
          echo "At least one required job has failed or was canceled."
          exit 1
      - run: echo "All critical checks passed or were intentionally skipped."
