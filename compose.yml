services:

  # ── Vexilon app ───────────────────────────────────────────────────────────────
  vexilon:
    build:
      context: .
      dockerfile: Containerfile
    container_name: vexilon
    environment:
      # Mandatory: Anthropic API key
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      
      # Optional: Basic Auth (Login is disabled if VEXILON_PASSWORD is empty)
      VEXILON_USERNAME: ${VEXILON_USERNAME:-admin}
      VEXILON_PASSWORD: ${VEXILON_PASSWORD:-}
      
      PORT: "7860"
    ports:
      - "7860:7860"
    cap_drop:
      - ALL
    tmpfs:
      - /tmp                  # Writable tmp for Gradio and other runtime files
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - ./app.py:/app/app.py:ro,Z  # Bind-mount app logic with SELinux (Z) and Read-Only (ro) safety
    
    # Use Gradio's hot-reloader for instant updates when app.py changes
    command: ["uv", "run", "gradio", "app.py"]
